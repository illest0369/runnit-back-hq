<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>RUNNIT BACK HQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html{height:100%;height:-webkit-fill-available}
body{width:100%;height:100dvh;overflow:hidden;background:#000;font-family:'Inter',sans-serif}
:root{
  --bg:#080808;--bg2:#111;--bg3:#1a1a1a;
  --fg:#f5f5f0;--fg2:rgba(245,245,240,.5);--fg3:rgba(245,245,240,.2);
  --accent:#39ff14;--accent-fg:#000;
  --border:rgba(245,245,240,.1);--reject:#ff3b30;--approve:#39ff14;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px);--sar:env(safe-area-inset-right,0px);
}
:root.light{
  --bg:#f0ede6;--bg2:#fff;--bg3:#e8e4dc;
  --fg:#080808;--fg2:rgba(8,8,8,.5);--fg3:rgba(8,8,8,.15);
  --accent:#1adb00;--accent-fg:#fff;--border:rgba(8,8,8,.12);
}
.bb{font-family:'Bebas Neue',sans-serif}
.mono{font-family:'JetBrains Mono',monospace}

/* ── Full-screen container ── */
#app{
  position:fixed;
  top:0;left:var(--sal);right:var(--sar);
  bottom:0;
  background:#000;
  display:flex;flex-direction:column;
}

/* ── Top chrome ── */
#top-chrome{
  position:absolute;top:0;left:0;right:0;z-index:30;
  padding:calc(var(--sat) + 10px) 16px 24px;
  background:linear-gradient(to bottom,rgba(0,0,0,.75) 0%,transparent 100%);
  display:flex;align-items:center;gap:10px;
  pointer-events:none;
}
#top-chrome > *{pointer-events:auto}
#channel-name{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;letter-spacing:1px;color:#fff;flex:1}
#last-action{font-family:'JetBrains Mono',monospace;font-size:9px;padding:3px 10px;border-radius:999px;display:none}
#user-avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
#user-avatar span{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--accent-fg);line-height:1}
#theme-btn{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.2);border-radius:999px;color:rgba(255,255,255,.7);font-family:'JetBrains Mono',monospace;font-size:9px;padding:3px 8px;cursor:pointer}

/* ── Card stack fills the space between chromes ── */
#stack-wrap{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
}
#stack{
  /* 9:16 within the full screen, no overflow */
  position:relative;
  width:100%;
  max-width:min(100vw, calc(100dvh * 9 / 16));
  height:100%;
  max-height:min(100dvh, calc(100vw * 16 / 9));
}

/* ── Cards ── */
.card{
  position:absolute;inset:0;
  border-radius:16px;overflow:hidden;
  background:var(--bg2);
  cursor:grab;user-select:none;
  transition:transform .32s cubic-bezier(.25,.46,.45,.94),box-shadow .32s;
  touch-action:none;
  box-shadow:0 8px 40px rgba(0,0,0,.6);
}
.card.dragging{transition:none;cursor:grabbing}
.card-media{position:absolute;inset:0;background:#000}
.card-media video{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  display:block;
  /* iOS: must be muted + playsinline to autoplay */
}
.card-media svg{position:absolute;inset:0;width:100%;height:100%}

/* overlay stamps */
.card-ov{position:absolute;inset:0;pointer-events:none;opacity:0;display:flex;align-items:center;justify-content:center}
.card-ov.left{background:linear-gradient(to right,rgba(57,255,20,.3),transparent);justify-content:flex-start;padding-left:24px}
.card-ov.right{background:linear-gradient(to left,rgba(255,59,48,.3),transparent);justify-content:flex-end;padding-right:24px}
.stamp{border:3px solid;border-radius:8px;padding:6px 18px;transform:rotate(-12deg)}
.stamp.skip{transform:rotate(12deg);border-color:var(--reject)}
.stamp.post{border-color:var(--approve)}

.card-bottom{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(to top,rgba(0,0,0,.92) 0%,transparent 100%);
  padding:56px 18px 18px;
}
.card-tag{font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(255,255,255,.5);margin-bottom:4px;letter-spacing:1px}
.card-hook{font-size:14px;font-weight:600;color:#fff;line-height:1.3;max-width:82%}
.card-foot{font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(255,255,255,.3);margin-top:6px}

/* ── Bottom chrome ── */
#bottom-chrome{
  position:absolute;bottom:0;left:0;right:0;z-index:30;
  padding:24px 20px calc(var(--sab) + 12px);
  background:linear-gradient(to top,rgba(0,0,0,.85) 0%,transparent 100%);
  pointer-events:none;
}
#swipe-hints{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
#pipe-row{display:flex;align-items:center;gap:8px}
.pipe-seg{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.15)}
.pipe-seg.done{background:var(--accent)}
.pipe-seg.active{background:rgba(57,255,20,.35)}

/* ── States ── */
#empty-state{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:5}
#loading-state{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:5}
</style>
</head>
<body>
<div id="app">
  <div id="stack-wrap">
    <div id="stack">
      <div id="loading-state">
        <div class="mono" style="font-size:12px;color:rgba(255,255,255,0.4);letter-spacing:2px">LOADING…</div>
      </div>
      <div id="empty-state">
        <div class="bb" style="font-size:64px;color:var(--accent);letter-spacing:2px">ALL CLEAR</div>
        <div class="mono" style="font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:1px">queue empty · good work</div>
      </div>
    </div>
  </div>

  <div id="top-chrome">
    <div id="channel-name">HQ<span style="color:var(--accent)">.</span></div>
    <div id="last-action"></div>
    <div id="user-avatar"><span>?</span></div>
    <button id="theme-btn">☾</button>
  </div>

  <div id="bottom-chrome">
    <div id="swipe-hints">
      <span class="mono" style="font-size:9px;color:rgba(255,59,48,0.8);letter-spacing:1px">← SKIP</span>
      <span class="mono" id="queue-count" style="font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:1px">—</span>
      <span class="mono" style="font-size:9px;color:rgba(57,255,20,0.8);letter-spacing:1px">POST →</span>
    </div>
    <div id="pipe-row">
      <span class="mono" style="font-size:8px;color:rgba(255,255,255,0.3);letter-spacing:1px">PIPE</span>
      <div style="flex:1;display:flex;gap:2px" id="pipe-track"></div>
      <span class="mono" style="font-size:8px;color:rgba(255,255,255,0.3)" id="pipe-label">—</span>
    </div>
  </div>
</div>

<script>
'use strict';
const PIPELINE=['trim','track','render','upload','score','meta','queue','dedup'];
const GRADIENTS=[['#1a1a2e','#16213e','#0f3460'],['#2d1b00','#4a2e00','#1a0d00'],['#0d1f0a','#1a3a14','#0a150a'],['#1f0a0a','#3a1414','#150a0a'],['#001a1a','#003333','#001010']];
let auth={username:'',channel:''};
let clips=[];
let theme=localStorage.getItem('rb_theme')||'dark';

function scoreColor(n){return n>=70?'#39ff14':n>=50?'#ffb400':'#ff3b30'}

function applyTheme(){
  document.documentElement.className=theme==='light'?'light':'';
  document.getElementById('theme-btn').textContent=theme==='dark'?'☀':'☾';
  localStorage.setItem('rb_theme',theme);
}

function ring(score,size){
  const r=(size-6)/2,circ=2*Math.PI*r,off=circ-(score/100)*circ,col=scoreColor(score);
  return`<svg width="${size}" height="${size}" style="flex-shrink:0"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1a1a1a" stroke-width="3"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${col}" stroke-width="3" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" stroke-linecap="round" transform="rotate(-90 ${size/2} ${size/2})"/><text x="${size/2}" y="${size/2+1}" text-anchor="middle" dominant-baseline="middle" font-family="Bebas Neue" font-size="${Math.round(size*.3)}" fill="${col}">${score}</text></svg>`;
}

function placeholder(clip,gi){
  const[g1,g2,g3]=GRADIENTS[gi%GRADIENTS.length];
  const s=clip.id.replace(/[^a-z0-9]/gi,'');
  return`<svg width="100%" height="100%" viewBox="0 0 360 640" preserveAspectRatio="xMidYMid slice"><defs><linearGradient id="gc${s}" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${g1}"/><stop offset="50%" stop-color="${g2}"/><stop offset="100%" stop-color="${g3}"/></linearGradient><linearGradient id="go${s}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="transparent"/><stop offset="100%" stop-color="rgba(0,0,0,0.75)"/></linearGradient></defs><rect width="360" height="640" fill="url(#gc${s})"/><rect width="360" height="640" fill="url(#go${s})"/><ellipse cx="180" cy="240" rx="55" ry="75" fill="rgba(255,255,255,0.04)"/><text x="16" y="20" font-family="JetBrains Mono" font-size="8" fill="rgba(255,255,255,0.3)">r2://${clip.channel}/${clip.id}</text><text x="344" y="632" text-anchor="end" font-family="JetBrains Mono" font-size="8" fill="rgba(255,255,255,0.4)">${clip.duration||''}</text></svg>`;
}

function buildCard(clip,si,gi){
  const div=document.createElement('div');
  div.className='card';
  div.dataset.clipId=clip.id;
  div.dataset.channel=clip.channel;
  // stack visual offset — back cards scale down & shift up
  div.style.transform=`scale(${1-si*0.035}) translateY(${si*14}px)`;
  div.style.zIndex=10-si;

  const tag=clip.decision==='approve_queue'?'APPROVE QUEUE':clip.decision.replace(/_/g,' ').toUpperCase();

  div.innerHTML=`
    <div class="card-media">
      ${placeholder(clip,gi)}
    </div>
    <div class="card-ov left">
      <div class="stamp post"><span class="bb" style="font-size:48px;color:var(--approve);letter-spacing:2px">POST</span></div>
    </div>
    <div class="card-ov right">
      <div class="stamp skip"><span class="bb" style="font-size:48px;color:var(--reject);letter-spacing:2px">SKIP</span></div>
    </div>
    <div class="card-bottom">
      <div style="display:flex;align-items:flex-end;justify-content:space-between">
        <div>
          <div class="card-tag">${tag}</div>
          <div class="card-hook">${clip.hook||'—'}</div>
        </div>
        ${ring(clip.score,50)}
      </div>
      <div class="card-foot">${clip.id} · ${clip.duration||'—'} · score ${clip.score}</div>
    </div>`;

  // inject video on top card only — add AFTER innerHTML so we can keep ref
  if(si===0 && clip.cdn_url){
    const media=div.querySelector('.card-media');
    const vid=document.createElement('video');
    vid.src=clip.cdn_url;
    vid.loop=true;
    vid.muted=true;           // MUST be muted for autoplay on iOS
    vid.setAttribute('playsinline','');
    vid.setAttribute('webkit-playsinline','');
    vid.autoplay=true;
    vid.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover';
    media.insertBefore(vid,media.firstChild);
    vid.play().catch(()=>{/* autoplay blocked — user tap will trigger */});
  }

  if(si===0) attachDrag(div,clip);
  return div;
}

function attachDrag(card,clip){
  let sx=0,cx=0,moved=false,active=false;
  const T=100;
  const xy=e=>e.touches?{x:e.touches[0].clientX}:{x:e.clientX};

  const onStart=e=>{
    sx=xy(e).x;cx=0;moved=false;active=true;
    card.classList.add('dragging');
  };
  const onMove=e=>{
    if(!active)return;
    cx=xy(e).x-sx;
    if(Math.abs(cx)>5)moved=true;
    card.style.transform=`translateX(${cx}px) rotate(${cx/18}deg) scale(1)`;
    card.querySelector('.card-ov.left').style.opacity=Math.max(0,Math.min(1,cx/T));
    card.querySelector('.card-ov.right').style.opacity=Math.max(0,Math.min(1,-cx/T));
    e.preventDefault();
  };
  const onEnd=()=>{
    if(!active)return;active=false;
    card.classList.remove('dragging');
    if(!moved){openDetail(clip);card.style.transform='';return}
    if(cx>T){
      card.style.transform='translateX(120%) rotate(30deg)';
      setTimeout(()=>finishAction(clip,'approve'),320);
    }else if(cx<-T){
      card.style.transform='translateX(-120%) rotate(-30deg)';
      setTimeout(()=>finishAction(clip,'reject'),320);
    }else{
      card.style.transform='';
      card.querySelector('.card-ov.left').style.opacity=0;
      card.querySelector('.card-ov.right').style.opacity=0;
    }
  };

  card.addEventListener('mousedown',onStart);
  card.addEventListener('mousemove',onMove);
  card.addEventListener('mouseup',onEnd);
  card.addEventListener('mouseleave',onEnd);
  card.addEventListener('touchstart',onStart,{passive:false});
  card.addEventListener('touchmove',onMove,{passive:false});
  card.addEventListener('touchend',onEnd);
}

function openDetail(clip){
  const p=new URLSearchParams({
    id:clip.id,
    channel:clip.channel,
    url:clip.cdn_url||'',
    score:clip.score,
    decision:clip.decision,
    hook:clip.hook||'',
    kw:clip.kw,fit:clip.fit,dur:clip.dur_score,tx:clip.tx,dup:clip.dup
  });
  window.location.href='/clip.html?'+p;
}

function finishAction(clip,action){
  clips=clips.filter(c=>c.id!==clip.id);
  showLastAction(clip.id,action);
  renderStack();
  // Send channel so n8n can route to correct TikTok account
  fetch('/api/approval',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({post_id:clip.id,action,channel:clip.channel})
  }).catch(()=>{});
}

function showLastAction(id,action){
  const el=document.getElementById('last-action');
  el.style.display='block';
  const ok=action==='approve';
  el.style.background=ok?'rgba(57,255,20,0.2)':'rgba(255,59,48,0.18)';
  el.style.color=ok?'#39ff14':'#ff3b30';
  el.style.border=`1px solid ${ok?'rgba(57,255,20,0.4)':'rgba(255,59,48,0.35)'}`;
  el.textContent=`${ok?'✓ POST':'✕ SKIP'} ${id}`;
  clearTimeout(el._t);el._t=setTimeout(()=>{el.style.display='none'},3000);
}

function renderStack(){
  document.getElementById('stack').querySelectorAll('.card').forEach(c=>c.remove());
  document.getElementById('loading-state').style.display='none';
  document.getElementById('queue-count').textContent=
    clips.length===0?'queue empty':`${clips.length} in queue`;

  if(clips.length===0){
    document.getElementById('empty-state').style.display='flex';
    return;
  }
  document.getElementById('empty-state').style.display='none';

  const vis=clips.slice(0,3);
  // render back-to-front so top card is on top
  vis.slice().reverse().forEach((clip,ri)=>{
    const si=vis.length-1-ri;
    document.getElementById('stack').appendChild(buildCard(clip,si,clips.indexOf(clip)));
  });

  const ps=Math.min(6,Math.max(3,8-clips.length));
  document.getElementById('pipe-track').innerHTML=
    PIPELINE.map((sg,i)=>
      `<div class="pipe-seg ${i<ps?'done':i===ps?'active':''}" title="${sg}"></div>`
    ).join('');
  document.getElementById('pipe-label').textContent=`${ps}/8`;
}

async function init(){
  applyTheme();
  try{
    const r=await fetch('/api/session',{credentials:'same-origin'});
    if(!r.ok){window.location.href='/login';return}
    const s=await r.json();
    auth.username=s.username||'';auth.channel=s.channel||'';
  }catch{window.location.href='/login';return}

  document.getElementById('channel-name').innerHTML=
    `${auth.channel.toUpperCase()}<span style="color:var(--accent)">.</span>`;
  document.getElementById('user-avatar').innerHTML=
    `<span>${(auth.username[0]||'?').toUpperCase()}</span>`;

  try{
    const r=await fetch('/api/clips',{credentials:'same-origin'});
    if(!r.ok)throw new Error();
    const d=await r.json();clips=d.clips||[];
  }catch{clips=[];}

  renderStack();
  document.getElementById('theme-btn').addEventListener('click',()=>{
    theme=theme==='dark'?'light':'dark';applyTheme();
  });
}
init();
</script>
</body>
</html>
